<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <!-- Bootstrap 5 CDN Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #96c6ea, #b597f6);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-card {
            background-color: #acecff50;
            backdrop-filter: blur(10px);
            border: 1px solid #33e4fc50;
            padding: 30px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 600px;
        }
    </style>
</head>
<body>


<div class="register-card">
    <h2 class="text-center mb-4">Student Registration</h2>
    
    <form action="#" method="POST" onsubmit="event.preventDefault();">
        
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Juan Dela Cruz" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Student LRN</label>
                <input type="text" class="form-control is-valid" placeholder="LRN" value="573829561906" required>
                 <div class="valid-feedback fw-bold">
                    LRN verified successfully!
                </div>
            </div>
        </div>


        <div class="mb-3">
            <label class="form-label">Username Handle</label>
            <div class="input-group">
                <span class="input-group-text">@</span>
                <input type="text" class="form-control" placeholder="student.username" required>
                <span class="input-group-text">@deped.gov.ph</span>
            </div>
        </div>


        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Academic Track / Strand</label>
                <select class="form-select" required>
                    <option value="" selected disabled>Choose strand...</option>
                    <option value="ict">TVL - ICT (Programming)</option>
                    <option value="ict">TVL - HE</option>
                    <option value="stem">Academic - STEM</option>
                    <option value="abm">Academic - ABM</option>
                    <option value="humms">Academic - Humms</option>
                     <option value="gass">Academic - GASS</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label d-block">Sex</label>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="gender" id="male" checked>
                    <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check form-check-inline mt-2">
                    <input class="form-check-input" type="radio" name="gender" id="female">
                    <label class="form-check-label" for="female">Female</label>
                </div>
            </div>
        </div>


        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" class="form-control is-valid" placeholder="Create password" value="12345678" required>
                 <div class="valid-feedback fw-bold">
                    Password is valid!
                </div>
            </div>


            <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control is-valid" placeholder="Retype password" value="12345678" required>
                <div class="valid-feedback fw-bold">
                    Password verified successfully!
                </div>
            </div>
        </div>


        <div class="mb-4 form-check">
            <input class="form-check-input" type="checkbox" id="terms" checked required>
            <label class="form-check-label small text-white-50" for="terms">
                I agree to the digital Data Privacy Policy rules.
            </label>
        </div>


        <button type="submit" class="btn btn-primary w-100 py-2">Submit Registration</button>
    </form>
</div>


</body>
</html>
