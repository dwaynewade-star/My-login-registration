<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <!-- Bootstrap 5 CDN Link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>

        body {
            background: linear-gradient (135deg, #96c6ea, #b597f6);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    
        .login-card {
            background-color: #acecff50;
            backdrop-filter: blur(10px);
            border: 1px solid #33e4fc50;
            padding: 40px;
            border-radius: 10px;
            color: white;
            width: 100%;
            max-width: 450px;
        }
    </style>
</head>
<body>


<div class="login-card">
    <h1 class="text-center mb-5">Login</h1>
    
    <form action="#" method="POST">
        
        <div class="form-floating mb-3">
            <input type="email" class="form-control form-control-lg text-dark" id="emailInput" placeholder="name@example.com" required>
            <label for="emailInput" class="text-dark">Email Address</label>
        </div>
        
        <div class="form-floating mb-3">
            <input type="password" class="form-control form-control-lg is-invalid text-dark" id="passwordInput" placeholder="Password" value="12345678">
            <label for="passwordInput" class="text-dark">Password</label>

            <div class="invalid-feedback fw-bold">
                Password Invalid.
            </div>
        </div>
        <a href="Register.html" target="_blank" class="text-decoration-none text-white text-bold">
            Don't have an account? Register here
        </a>


        <button type="submit" class="btn btn-primary w-100 btn-lg mt-2">Sign In</button>
    </form>
</div>

</body>
</html>
